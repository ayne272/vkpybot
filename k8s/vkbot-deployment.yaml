apiVersion: apps/v1
kind: Deployment
metadata:
  name: vkbot
  namespace: vkbot
  labels:
    app: vkbot
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vkbot
  template:
    metadata:
      labels:
        app: vkbot
    spec:
      containers:
      - name: bot
        image: ghcr.io/ayne272/vkpybot:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: vkbot-secrets
        env:
        - name: POSTGRES_HOST
          value: "db"
        - name: TZ
          value: "Europe/Moscow"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: Always
