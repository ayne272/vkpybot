apiVersion: v1
kind: Namespace
metadata:
  name: vkbot
---
apiVersion: v1
kind: Secret
metadata:
  name: vkbot-secrets
  namespace: vkbot
type: Opaque
stringData:
  # Замените на ваши реальные значения из .env
  POSTGRES_USER: "your_user"
  POSTGRES_PASSWORD: "your_password"
  POSTGRES_DB: "vkbot"
  VK_TOKEN: "your_vk_token"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: vkbot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vkbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        envFrom:
        - secretRef:
            name: vkbot-secrets
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: vkbot
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vkbot
  namespace: vkbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vkbot
  template:
    metadata:
      labels:
        app: vkbot
    spec:
      containers:
      - name: bot
        image: vkpybot:latest
        imagePullPolicy: Never
        envFrom:
        - secretRef:
            name: vkbot-secrets
        env:
        - name: POSTGRES_HOST
          value: "db"
        - name: TZ
          value: "Europe/Moscow"
