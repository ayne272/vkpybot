apiVersion: v1
kind: Secret
metadata:
    name: vkbot-secrets
    namespace: vkbot
type: Opaque
stringData:
    POSTGRES_USER: ENC[AES256_GCM,data:your_encrypted_user,iv:xxx,tag:xxx,type:str]
    POSTGRES_PASSWORD: ENC[AES256_GCM,data:your_encrypted_password,iv:xxx,tag:xxx,type:str]
    POSTGRES_DB: ENC[AES256_GCM,data:your_encrypted_db,iv:xxx,tag:xxx,type:str]
    VK_TOKEN: ENC[AES256_GCM,data:your_encrypted_token,iv:xxx,tag:xxx,type:str]
sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
    age:
        - recipient: age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            ...
            -----END AGE ENCRYPTED FILE-----
    lastmodified: "2026-04-09T09:01:18Z"
    mac: ENC[AES256_GCM,data:xxx,iv:xxx,tag:xxx,type:str]
    pgp: []
    unencrypted_suffix: _unencrypted
    version: 3.8.1
