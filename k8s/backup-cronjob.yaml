apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: vkbot
  labels:
    app: postgres-backup
spec:
  schedule: "0 3 * * *"  # 3:00 UTC (6:00 MSK) ежедневно
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          containers:
          - name: backup
            image: postgres:16-alpine
            command:
            - /bin/sh
            - -c
            - |
              # Установить пароль для pg_dump
              export PGPASSWORD=$POSTGRES_PASSWORD

              # Создать бэкап
              BACKUP_FILE="/backups/vkbot_$(date +%Y%m%d_%H%M%S).dump"
              pg_dump -h db -U $POSTGRES_USER -d $POSTGRES_DB -Fc -f "$BACKUP_FILE"

              # Проверить успешность
              if [ $? -eq 0 ]; then
                echo "Backup created successfully: $BACKUP_FILE"
              else
                echo "Backup failed!"
                exit 1
              fi

              # Удалить старые бэкапы (оставить последние 7)
              cd /backups
              ls -t vkbot_*.dump 2>/dev/null | tail -n +8 | xargs -r rm

              echo "Backup retention applied. Current backups:"
              ls -lh /backups/
            envFrom:
            - secretRef:
                name: vkbot-secrets
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-pvc
          restartPolicy: OnFailure
